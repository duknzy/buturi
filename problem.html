<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RETROGRADE // 問題解答セッション</title>
    <link rel="stylesheet" href="style.css">
    
    <script>
        window.MathJax = {
            tex: { inlineMath: [['$', '$'], ['\\(', '\\)']], displayMath: [['$$', '$$'], ['\\[', '\\]']] },
            chtml: { displayAlign: 'left' }
        };
    </script>
    <script id="MathJax-script" async></script>
    <script>
        // コピペ破壊防御：ドットも完全に分離して自動リンク化の隙を与えない
        (function() {
            var script = document.getElementById("MathJax-script");
            var proto = "https" + "://";
            var d = ".";
            script.src = proto + "cdn" + d + "jsdelivr" + d + "net/npm/mathjax@3/es5/tex-chtml.js";
        })();
    </script>

    <style>
        .squircle-tile { border: 1px solid var(--accent-cyan); box-shadow: 4px 4px 0px rgba(0, 243, 255, 0.1); }
        .workspace-container { max-width: 1500px; margin: 0 auto; display: flex; flex-direction: column; gap: 1.5rem; height: calc(100vh - 3rem); }
        header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #1a2a35; padding-bottom: 1rem; }
        .bento-grid { display: grid; grid-template-columns: repeat(12, 1fr); grid-template-rows: minmax(0, 1fr) auto; gap: 1.5rem; flex-grow: 1; }
        .main-question-tile  { grid-column: span 8; grid-row: span 1; display: flex; flex-direction: column; }
        .ai-sidebar-tile      { grid-column: span 4; grid-row: span 2; }
        .answer-formula-tile { grid-column: span 8; grid-row: span 1; }
        .badge-ai { background: transparent; color: var(--accent-cyan); border: 1px solid var(--accent-cyan); }
        .question-text { font-size: var(--fs-lg); font-weight: 800; line-height: 1.4; }
        
        .physics-figure-box { 
            width: 100%; flex-grow: 1; background: #020204; 
            border: 1px dashed #1a2a35; border-radius: 16px; 
            margin: 1rem 0 0 0; position: relative; 
            display: flex; align-items: center; justify-content: center; overflow: hidden; 
        }

        .glass-sidebar { background: var(--card-bg-glass); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px); border: 1px solid rgba(0, 243, 255, 0.25); }
        .chat-history { flex-grow: 1; overflow-y: auto; margin: 1rem 0; display: flex; flex-direction: column; gap: 1rem; padding-right: 0.5rem; }
        .chat-bubble { padding: 0.8rem 1rem; border-radius: 16px; font-size: var(--fs-md); line-height: 1.4; max-width: 90%; }
        .bubble-ai { background: rgba(26, 26, 40, 0.5); border-left: 3px solid var(--accent-cyan); color: var(--text-bright-muted); align-self: flex-start; }
        .bubble-user { background: rgba(255, 0, 127, 0.1); border-right: 3px solid var(--accent-magenta); color: var(--text-main); align-self: flex-end; }
        .chat-input-wrapper { display: flex; gap: 0.5rem; border-top: 1px solid #1a2a35; padding-top: 1rem; }
        .chat-input { flex-grow: 1; background: #000; border: 1px solid #222; padding: 0.6rem 1rem; color: #fff; border-radius: 10px; }
        .self-check-container { display: flex; flex-direction: column; gap: 1rem; width: 100%; margin-top: 0.5rem; }
        .reveal-btn-area { display: flex; width: 100%; }
        
        .reveal-zone { 
            display: none; flex-direction: column; gap: 1rem; width: 100%; 
            background: rgba(255,255,255,0.01); padding: 1.5rem; border-radius: 16px; 
            border: 1px dashed #222; margin-top: 0.5rem;
            max-height: 450px; overflow-y: auto;
        }
        
        .model-answer-text { 
            font-size: 1.05rem; 
            color: var(--text-bright-muted); 
            font-weight: 500; 
            margin-bottom: 0.5rem; 
            white-space: pre-wrap; 
            line-height: 1.8;      
            letter-spacing: 0.5px;
        }
        
        .judgment-buttons { display: flex; gap: 1.5rem; width: 100%; }
        .btn-correct { background: var(--accent-cyan) !important; box-shadow: 4px 4px 0px #008b94 !important; flex: 1; height: 54px; font-size: 1.1rem; }
        .btn-incorrect { background: var(--accent-magenta) !important; color: #000 !important; box-shadow: 4px 4px 0px #9e004f !important; flex: 1; height: 54px; font-size: 1.1rem; }
        #neon-canvas { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; pointer-events: none; z-index: 99999; display: block; }
        
        .btn-analyze-now { background: #111 !important; color: var(--accent-cyan) !important; border: 1px solid var(--accent-cyan) !important; box-shadow: 3px 3px 0px rgba(0,243,255,0.2) !important; font-size: 0.85rem; padding: 0.3rem 0.8rem; border-radius: 8px; cursor: pointer; display: none; font-weight: 800; }
        .btn-analyze-now:hover { background: rgba(0,243,255,0.05) !important; }

        @media (max-width: 1100px) { .workspace-container { height: auto; } .bento-grid { grid-template-rows: auto; } .main-question-tile, .answer-formula-tile, .ai-sidebar-tile { grid-column: span 12; } .ai-sidebar-tile { height: 400px; } }
    </style>
</head>
<body>

    <canvas id="neon-canvas"></canvas>

    <div class="workspace-container">
        <header>
            <div style="display: flex; align-items: center; gap: 1rem;">
                <span style="font-weight: 900; letter-spacing: -1px; color: var(--accent-cyan)">RE:MIND // SESSION</span>
                <span style="color: var(--text-muted); font-size: var(--fs-sm);" id="problem-id-display">PROBLEM ID: --</span>
            </div>
            <div>
                <button type="button" class="tactile-btn tactile-btn-secondary" onclick="location.href='index.html'">
                    ダッシュボードに戻る
                </button>
            </div>
        </header>

        <main class="bento-grid">
            <section class="squircle-tile main-question-tile">
                <div class="tile-header-group" style="display: flex; justify-content: space-between; align-items: center; width:100%;">
                    <span class="badge badge-physics" id="question-badge">LOADING...</span>
                    <button type="button" class="btn-analyze-now" id="on-demand-analyze-btn">⚡ この問題をAI解析する</button>
                </div>
                
                <div class="physics-figure-box" id="figure-box"></div>
            </section>

            <aside class="squircle-tile ai-sidebar-tile glass-sidebar">
                <div class="tile-header-group">
                    <span class="badge badge-ai" id="ai-status">AI TUTOR // ACTIVE</span>
                    <h3 style="font-size: var(--fs-md); font-weight: 800;" id="current-step">INITIALIZING...</h3>
                </div>

                <div class="chat-history">
                    <div class="chat-bubble bubble-ai" id="initial-ai-bubble">
                        CONNECTING TO CLOUD...
                    </div>
                </div>

                <div class="chat-input-wrapper">
                    <input type="text" class="chat-input" placeholder="質問を入力...">
                    <button type="button" class="tactile-btn" style="padding: 0.5rem 1rem;">送信</button>
                </div>
            </aside>

            <section class="squircle-tile answer-formula-tile">
                <div class="tile-header-group">
                    <h3 style="font-size: var(--fs-md); font-weight: 900;">ANSWER CHECK // 自己採点</h3>
                </div>

                <div class="self-check-container">
                    <div class="reveal-btn-area" id="reveal-btn-wrap">
                        <button type="button" class="tactile-btn" id="show-answer-btn" style="width:100%; height:54px; font-size:1.1rem;" disabled>
                            🔒 LOADING...
                        </button>
                    </div>

                    <div class="reveal-zone" id="answer-reveal-zone">
                        <div style="font-size:0.8rem; color:var(--text-muted); font-weight:800; margin-bottom:0.2rem;">MODEL ANSWER</div>
                        <div class="model-answer-text" id="target-model-answer"></div>
                        <div class="judgment-buttons">
                            <button type="button" class="tactile-btn btn-incorrect" id="btn-judge-wrong">❌ 間混えた（再挑戦）</button>
                            <button type="button" class="tactile-btn btn-correct" id="btn-judge-right">🎉 合ってた（克服！）</button>
                        </div>
                    </div>
                </div>
            </section>
        </main>
    </div>

   <script type="module">
        // 🚨 超厳重コピペ破壊防御：ドットすらも完全に分解結合し、チャットツールの自動リンク化を100%未然に防ぐ
        const proto = "https" + "://";
        const d = ".";
        const fbBase = proto + "www" + d + "gstatic" + d + "com/firebasejs/10.12.0/";

        const { initializeApp } = await import(fbBase + "firebase-app.js");
        const { getAuth, onAuthStateChanged } = await import(fbBase + "firebase-auth.js");
        const { getDatabase, ref, set, onValue } = await import(fbBase + "firebase-database.js");

        const firebaseConfig = {
            apiKey: "AIzaSyB55MdhpjJizQaLEdRu-XhBVJ4PqrHsAyY", 
            authDomain: "buturi-2449e.firebaseapp.com",
            databaseURL: proto + "buturi-2449e-default-rtdb" + d + "asia-southeast1" + d + "firebasedatabase" + d + "app/",
            projectId: "buturi-2449e",
            storageBucket: "buturi-2449e.appspot.com",
            messagingSenderId: "976306696124",
            appId: "1:976306696124:web:e455c1953544bff5c345b9"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const database = getDatabase(app);

        const urlParams = new URLSearchParams(window.location.search);
        const PROBLEM_ID = urlParams.get('id');

        let GEMINI_API_KEY = localStorage.getItem("RE_MIND_GEMINI_KEY");
        let DEEPSEEK_API_KEY = localStorage.getItem("RE_MIND_DEEPSEEK_KEY");

        if (!GEMINI_API_KEY) {
            GEMINI_API_KEY = prompt("GeminiのAPIキーを入力してください:");
            if (GEMINI_API_KEY) localStorage.setItem("RE_MIND_GEMINI_KEY", GEMINI_API_KEY);
        }
        if (!DEEPSEEK_API_KEY) {
            DEEPSEEK_API_KEY = prompt("DeepSeekのAPIキーを入力してください:");
            if (DEEPSEEK_API_KEY) localStorage.setItem("RE_MIND_DEEPSEEK_KEY", DEEPSEEK_API_KEY);
        }

        const GEMINI_API_URL = `${proto}generativelanguage${d}googleapis${d}com/v1beta/models/gemini-2.5-flash:generateContent?key=${GEMINI_API_KEY}`;
        const DEEPSEEK_API_URL = proto + "api" + d + "deepseek" + d + "com/v1/chat/completions";
        const MODEL_NAME = "deepseek-chat";

        const GEMINI_SYSTEM_INSTRUCTION = `
        あなたは高校数学・物理の「誤答分析エキスパートAI」です。提出された問題（画像またはテキスト）を深く分析してください。
        出力は必ず以下のJSONフォーマットの形式にしてください。他の説明テキストは絶対に含めないでください。
        {
          "subject": "物理" または "数学",
          "field": "分野名",
          "short_title": "問題の要約タイトル",
          "extracted_text": "読み取った正確な問題文の全文。数式や記号を含む場合は必ず $ $ で挟むこと",
          "trap_description": "高校生がこの問題で最も間違えやすいポイントや罠の解説文",
          "model_answer": "この問題の最終的な正しい答えと、ステップごとの分かりやすい解説。数式や変数を記述する場合は、必ず前後に $ または $$ をつけて美しいLaTeX形式にすること。解説文は1行に詰め込まず、手順ごとに必ず改行コード（\\n）を挟んで、美しい箇条書き形式（1., 2.など）で出力すること"
        }
        `;

        const SYSTEM_INSTRUCTION_BASE = `
        あなたはソクラテス式問答法を用いる高校生向けAIチューターです。
        正解（数式・数値）は絶対教えず、1回につき1つの小さな問いかけで自力解決へ導いてください。
        数式や変数（m, v, g, theta等）は必ず「$m$」「$\\sin\\theta$」のように$で囲むLaTeX形式にすること。

        返答は以下のJSONのみ（説明不要）：
        {
          "ai_response": "生徒へのヒント（数式は$ $を使用）",
          "current_step_label": "現在のステップ名"
        }
        `.trim();

        let chatHistory = []; 
        let currentProblemData = {};
        let loginUid = null;

        onAuthStateChanged(auth, (user) => {
            if (user) {
                loginUid = user.uid;
                if (!PROBLEM_ID) {
                    alert("問題IDの指定がありません。");
                    location.href = "index.html";
                    return;
                }
                loadCloudProblemSession(user.uid);
            } else {
                location.href = "index.html";
            }
        });

        function loadCloudProblemSession(uid) {
            const probRef = ref(database, 'users/' + uid + '/problems/' + PROBLEM_ID);
            
            onValue(probRef, (snapshot) => {
                const data = snapshot.val();
                if (!data) {
                    alert("指定された問題が見つかりません。");
                    location.href = "index.html";
                    return;
                }

                currentProblemData = data;

                document.getElementById("problem-id-display").textContent = "PROBLEM ID: " + currentProblemData.id;
                
                let rawAnswer = currentProblemData.answerFormula || "解答データなし";
                let formattedAnswer = rawAnswer
                    .replace(/(\d+\.\s*\*\*)/g, '\n\n$1') 
                    .replace(/(\*\*方法\d+：)/g, '\n\n$1') 
                    .replace(/(⇒)/g, '\n $1')            
                    .replace(/(したがって、)/g, '\n\n$1')   
                    .trim();

                document.getElementById("target-model-answer").textContent = formattedAnswer;
                
                const badge = document.getElementById("question-badge");
                badge.textContent = currentProblemData.subject + " // " + currentProblemData.field + " // 誤答回数: " + String(currentProblemData.errorCount).padStart(2, '0');
                
                const analyzeBtn = document.getElementById("on-demand-analyze-btn");
                if (currentProblemData.subject === "未分類") {
                    analyzeBtn.style.display = "block";
                } else {
                    analyzeBtn.style.display = "none";
                }

                const figBox = document.getElementById("figure-box");
                if (currentProblemData.imageData) {
                    figBox.innerHTML = '<img src="' + currentProblemData.imageData + '" style="width:100%; height:100%; object-fit:contain; border-radius:12px;">';
                } else {
                    figBox.innerHTML = '<div style="padding:2rem; text-align:center; color:var(--text-muted);">' + currentProblemData.title + '</div>';
                }
                
                if (currentProblemData.subject === "未分類") {
                    document.getElementById("initial-ai-bubble").textContent = "この問題は未解析ストックです。右上の『⚡ この問題をAI解析する』を押すと、Gemini Visionが起動して完全に対話可能になります！";
                    document.getElementById("current-step").textContent = "ステップ0: 未解析";
                } else {
                    document.getElementById("initial-ai-bubble").textContent = "クラウド連携完了。DeepSeekのブレインがスタンバイしています！";
                    document.getElementById("current-step").textContent = "ステップ1: 状況の整理";
                }

                const showAnsBtn = document.getElementById("show-answer-btn");
                showAnsBtn.textContent = "👁 模範解答を表示して答え合わせする";
                showAnsBtn.disabled = false;

                if (chatHistory.length === 0) {
                    chatHistory = [
                        { "role": "user", "content": "【問題文】 " + currentProblemData.title },
                        { "role": "assistant", "content": `{"ai_response": "問題を確認しました。どこから考えてみましょうか？", "current_step_label": "ステップ1: 状況の整理"}` }
                    ];
                }
                if (window.MathJax && MathJax.typesetPromise) MathJax.typesetPromise();
            }, { onlyOnce: true });
        }

        async function runOnDemandAnalysis() {
            if (!loginUid || !currentProblemData.imageData) {
                alert("解析可能な画像データが見つかりません。");
                return;
            }

            const analyzeBtn = document.getElementById("on-demand-analyze-btn");
            analyzeBtn.textContent = "⚙️ 爆速解析中...";
            analyzeBtn.disabled = true;

            let base64Raw = currentProblemData.imageData.split(",")[1];
            let mimeType = currentProblemData.imageData.split(",")[0].split(":")[1].split(";")[0];

            let parts = [
                { "text": "提出されたデータを解析し、最終的な『正しい答え（model_answer）』も含めて指定のJSONで返してください。" },
                { "inlineData": { "mimeType": mimeType, "data": base64Raw } }
            ];

            try {
                const response = await fetch(GEMINI_API_URL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        "contents": [{ "parts": parts }],
                        "systemInstruction": { "parts": [{ "text": GEMINI_SYSTEM_INSTRUCTION }] },
                        "generationConfig": { "responseMimeType": "application/json", "temperature": 0.3 }
                    })
                });

                const data = await response.json();
                let rawJsonText = data.candidates[0].content.parts[0].text.trim();

                if (rawJsonText.startsWith("```json")) rawJsonText = rawJsonText.substring(7);
                else if (rawJsonText.startsWith("```")) rawJsonText = rawJsonText.substring(3);
                if (rawJsonText.endsWith("```")) rawJsonText = rawJsonText.substring(0, rawJsonText.length - 3);
                rawJsonText = rawJsonText.trim();

                const fixJsonEscapes = (str) => {
                    let inString = false; let result = "";
                    for (let i = 0; i < str.length; i++) {
                        let c = str[i];
                        if (c === '"' && (i === 0 || str[i-1] !== '\\')) { inString = !inString; result += c; }
                        else if (c === '\\' && inString) {
                            let next = str[i+1];
                            if (next === '"') { result += '\\"'; i++; }
                            else if (next === '\\') { result += '\\\\'; i++; }
                            else if (next === 'n' && (str[i+2] === ' ' || str[i+2] === '"' || str[i+2] === '\\' || !/[a-zA-Z]/.test(str[i+2]))) { result += '\\n'; i++; }
                            else { result += '\\\\'; }
                        } else { result += c; }
                    }
                    return result;
                };

                const aiResult = JSON.parse(fixJsonEscapes(rawJsonText));

                currentProblemData.title = aiResult.extracted_text || currentProblemData.title;
                currentProblemData.short_title = aiResult.short_title;
                currentProblemData.subject = aiResult.subject;
                currentProblemData.field = aiResult.field;
                currentProblemData.trap_description = aiResult.trap_description;
                currentProblemData.answerFormula = aiResult.model_answer;

                const probRef = ref(database, 'users/' + loginUid + '/problems/' + PROBLEM_ID);
                await set(probRef, currentProblemData);

                alert("⚡ AI解析が完了しました！セッションをリロードします。");
                window.location.reload();

            } catch (error) {
                console.error(error);
                alert("オンデマンド解析に失敗しました。");
                analyzeBtn.textContent = "⚡ この問題をAI解析する";
                analyzeBtn.disabled = false;
            }
        }

        async function processSelfJudgment(isCorrect) {
            if (!loginUid) return;
            const probRef = ref(database, 'users/' + loginUid + '/problems/' + PROBLEM_ID);

            if (isCorrect) {
                triggerNeonExplosion(); 
                setTimeout(() => { alert("🎉 克服おめでとうございます！！素晴らしい！"); }, 200);
                currentProblemData.lastResult = true;
                currentProblemData.errorCount = 0; 
            } else {
                alert("❌ クラウドに記録しました。AIと一緒に考え直しよう！");
                currentProblemData.lastResult = false;
                currentProblemData.errorCount = Number(currentProblemData.errorCount || 1) + 1;
            }

            currentProblemData.lastAttemptAt = new Date().toISOString();
            await set(probRef, currentProblemData);

            document.getElementById("answer-reveal-zone").style.display = "none";
            document.getElementById("reveal-btn-wrap").style.display = "flex";
            loadCloudProblemSession(loginUid);
        }

        function cleanDeepSeekResponse(rawText) {
            let text = rawText.trim();
            if (text.includes("</think>")) {
                text = text.split("</think>")[1].trim();
            }
            if (text.startsWith("```json")) text = text.substring(7);
            else if (text.startsWith("```")) text = text.substring(3);
            if (text.endsWith("```")) text = text.substring(0, text.length - 3);
            text = text.trim();

            let inString = false; let result = "";
            for (let i = 0; i < text.length; i++) {
                let c = text[i];
                if (c === '"' && (i === 0 || text[i-1] !== '\\')) { inString = !inString; result += c; }
                else if (c === '\\' && inString) {
                    let next = text[i+1];
                    if (next === '"') { result += '\\"'; i++; }
                    else if (next === '\\') { result += '\\\\'; i++; }
                    else if (next === 'n' && (text[i+2] === ' ' || text[i+2] === '"' || text[i+2] === '\\' || !/[a-zA-Z]/.test(text[i+2]))) { result += '\\n'; i++; }
                    else { result += '\\\\'; }
                } else { result += c; }
            }
            return JSON.parse(result);
        }

        async function sendMessageToGemini(studentMessage) {
            if (currentProblemData.subject === "未分類") {
                alert("対話を始める前に、まずは右上のボタンからAI解析を実行してください。");
                return;
            }

            const statusBadge = document.getElementById("ai-status");
            statusBadge.textContent = "AI TUTOR // THINKING...";
            statusBadge.style.color = "var(--accent-magenta)";
            
            chatHistory.push({ "role": "user", "content": studentMessage });

            const recentHistory = chatHistory.slice(1).slice(-4);
            const optimizedMessages = [
                { "role": "system", "content": SYSTEM_INSTRUCTION_BASE },
                chatHistory[0], 
                ...recentHistory
            ];

            try {
                const response = await fetch(DEEPSEEK_API_URL, {
                    method: "POST",
                    headers: { 
                        "Content-Type": "application/json",
                        "Authorization": "Bearer " + DEEPSEEK_API_KEY
                    },
                    body: JSON.stringify({
                        "model": MODEL_NAME,
                        "messages": optimizedMessages,
                        "temperature": 0.5,
                        "response_format": { "type": "json_object" }
                    })
                });
                
                const data = await response.json();
                let rawOutput = data.choices[0].message.content;
                const aiJson = cleanDeepSeekResponse(rawOutput);

                chatHistory.push({ "role": "assistant", "content": JSON.stringify(aiJson) });
                updateChatUI(studentMessage, aiJson);
            } catch (error) { 
                console.error(error);
                alert("DeepSeekブレインとの通信に失敗しました。"); 
            }
            finally { statusBadge.textContent = "AI TUTOR // ACTIVE"; statusBadge.style.color = "var(--accent-cyan)"; }
        }

        function updateChatUI(userText, aiJson) {
            const chatHistoryArea = document.querySelector(".chat-history");
            const stepLabel = document.getElementById("current-step");
            const uBubble = document.createElement("div"); uBubble.className = "chat-bubble bubble-user"; uBubble.textContent = userText; chatHistoryArea.appendChild(uBubble);
            const aBubble = document.createElement("div"); aBubble.className = "chat-bubble bubble-ai"; aBubble.textContent = aiJson.ai_response; chatHistoryArea.appendChild(aBubble);
            if (aiJson.current_step_label) stepLabel.textContent = aiJson.current_step_label;
            chatHistoryArea.scrollTop = chatHistoryArea.scrollHeight;
            if (window.MathJax && MathJax.typesetPromise) MathJax.typesetPromise();
        }

        const canvas = document.getElementById("neon-canvas"); const ctx = canvas.getContext("2d"); let particles = [];
        function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener("resize", resizeCanvas); resizeCanvas();
        class Particle { constructor(x, y, color) { this.x = x; this.y = y; this.size = Math.random() * 4 + 2; this.speedX = Math.random() * 12 - 6; this.speedY = Math.random() * -15 - 5; this.gravity = 0.3; this.color = color; this.alpha = 1; this.decay = Math.random() * 0.015 + 0.01; } update() { this.speedY += this.gravity; this.x += this.speedX; this.y += this.speedY; this.alpha -= this.decay; } draw() { ctx.save(); ctx.globalAlpha = this.alpha; ctx.shadowBlur = 15; ctx.shadowColor = this.color; ctx.fillStyle = this.color; ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill(); ctx.restore(); } }
        function triggerNeonExplosion() { const colors = ["#00f3ff", "#ff007f", "#fff500"]; const startX = canvas.width / 2, startY = canvas.height * 0.8; for (let i = 0; i < 150; i++) particles.push(new Particle(startX, startY, colors[Math.floor(Math.random() * colors.length)])); animateParticles(); }
        function animateParticles() { if (particles.length === 0) { ctx.clearRect(0, 0, canvas.width, canvas.height); return; } ctx.clearRect(0, 0, canvas.width, canvas.height); for (let i = particles.length - 1; i >= 0; i--) { particles[i].update(); particles[i].draw(); if (particles[i].alpha <= 0) particles.splice(i, 1); } requestAnimationFrame(animateParticles); }

        document.addEventListener("DOMContentLoaded", () => {
            const sendBtn = document.querySelector(".chat-input-wrapper button");
            const inputField = document.querySelector(".chat-input");
            const showAnswerBtn = document.getElementById("show-answer-btn");
            const revealWrap = document.getElementById("reveal-btn-wrap");
            const revealZone = document.getElementById("answer-reveal-zone");
            const onDemandBtn = document.getElementById("on-demand-analyze-btn");

            sendBtn.addEventListener("click", () => { const t = inputField.value.trim(); if (t) { inputField.value = ""; sendMessageToGemini(t); } });
            inputField.addEventListener("keypress", (e) => { if (e.key === "Enter") { const t = inputField.value.trim(); if (t) { inputField.value = ""; sendMessageToGemini(t); } } });
            showAnswerBtn.addEventListener("click", () => { revealWrap.style.display = "none"; revealZone.style.display = "flex"; if (window.MathJax && MathJax.typesetPromise) MathJax.typesetPromise(); });
            document.getElementById("btn-judge-right").addEventListener("click", () => processSelfJudgment(true));
            document.getElementById("btn-judge-wrong").addEventListener("click", () => processSelfJudgment(false));
            onDemandBtn.addEventListener("click", () => runOnDemandAnalysis());
        });
   </script>
