<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RETROGRADE // 問題解答セッション</title>
    <link rel="stylesheet" href="style.css">
    
    <script>
        window.MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']]
            },
            chtml: { displayAlign: 'left' }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>

    <style>
        .squircle-tile {
            border: 1px solid var(--accent-cyan);
            box-shadow: 4px 4px 0px rgba(0, 243, 255, 0.1);
        }

        .workspace-container {
            max-width: 1500px; margin: 0 auto;
            display: flex; flex-direction: column; gap: 1.5rem;
            height: calc(100vh - 3rem);
        }

        header {
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid #1a2a35; padding-bottom: 1rem;
        }

        .bento-grid {
            display: grid; grid-template-columns: repeat(12, 1fr);
            grid-template-rows: minmax(0, 1fr) auto; gap: 1.5rem; flex-grow: 1;
        }

        .main-question-tile  { grid-column: span 8; grid-row: span 1; }
        .ai-sidebar-tile      { grid-column: span 4; grid-row: span 2; }
        .answer-formula-tile { grid-column: span 8; grid-row: span 1; }

        .badge-ai { background: transparent; color: var(--accent-cyan); border: 1px solid var(--accent-cyan); }
        .question-text { font-size: var(--fs-lg); font-weight: 800; line-height: 1.4; }

        .physics-figure-box {
            width: 100%; height: 260px; background: #020204;
            border: 1px dashed #1a2a35; border-radius: 16px;
            margin: 1rem 0; position: relative;
            display: flex; align-items: center; justify-content: center; overflow: hidden;
        }
        .vector-diagram {
            width: 200px; height: 120px; border-bottom: 2px solid var(--text-muted);
            position: relative; transform: rotate(-15deg);
        }
        .vector-diagram::after {
            content: ''; position: absolute; bottom: 0; left: 40px; width: 40px; height: 40px;
            border: 2px solid var(--accent-magenta); transform: rotate(45deg);
        }
        .vector-arrow {
            position: absolute; bottom: 0; left: 0; width: 120px; height: 2px;
            background: var(--accent-cyan); transform: rotate(45deg); transform-origin: left bottom;
        }
        .vector-arrow::after { content: '▶'; position: absolute; right: -4px; top: -6px; font-size: 8px; color: var(--accent-cyan); }

        .glass-sidebar {
            background: var(--card-bg-glass); backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px); border: 1px solid rgba(0, 243, 255, 0.25);
        }
        .chat-history {
            flex-grow: 1; overflow-y: auto; margin: 1rem 0;
            display: flex; flex-direction: column; gap: 1rem; padding-right: 0.5rem;
        }
        .chat-bubble { padding: 0.8rem 1rem; border-radius: 16px; font-size: var(--fs-md); line-height: 1.4; max-width: 90%; }
        .bubble-ai { background: rgba(26, 26, 40, 0.5); border-left: 3px solid var(--accent-cyan); color: var(--text-bright-muted); align-self: flex-start; }
        .bubble-user { background: rgba(255, 0, 127, 0.1); border-right: 3px solid var(--accent-magenta); color: var(--text-main); align-self: flex-end; }

        .chat-input-wrapper { display: flex; gap: 0.5rem; border-top: 1px solid #1a2a35; padding-top: 1rem; }
        .chat-input { flex-grow: 1; background: #000; border: 1px solid #222; padding: 0.6rem 1rem; color: #fff; border-radius: 10px; }

        .formula-input-container { display: flex; gap: 1rem; width: 100%; align-items: center; margin-top: 1rem; }
        .formula-input-field {
            flex-grow: 1; background-color: #000; border: 2px solid #22222a; border-radius: 16px;
            padding: 1.2rem; font-family: monospace; font-size: var(--fs-lg); font-weight: bold;
            color: var(--accent-cyan); letter-spacing: 1px;
            transition: border-color 250ms ease, box-shadow 250ms cubic-bezier(0.2, 0.8, 0.2, 1);
        }
        .formula-input-field:focus {
            outline: none; border-color: var(--accent-cyan);
            box-shadow: 0 0 20px rgba(0, 243, 255, 0.6), inset 0 0 10px rgba(0, 243, 255, 0.2);
        }
    </style>
</head>
<body>

    <div class="workspace-container">
        <header>
            <div style="display: flex; align-items: center; gap: 1rem;">
                <span style="font-weight: 900; letter-spacing: -1px; color: var(--accent-cyan)">RE:MIND // SESSION</span>
                <span style="color: var(--text-muted); font-size: var(--fs-sm);" id="problem-id-display">PROBLEM ID: --</span>
            </div>
            <div>
                <button type="button" class="tactile-btn tactile-btn-secondary" onclick="location.href='index.html'">
                    ダッシュボードに戻る
                </button>
            </div>
        </header>

        <main class="bento-grid">
            <section class="squircle-tile main-question-tile">
                <div class="tile-header-group">
                    <span class="badge badge-physics" id="question-badge">読み込み中...</span>
                    <h2 class="question-text" id="question-text-display">問題データを読み込んでいます...</h2>
                </div>
                
                <div class="physics-figure-box" id="figure-box">
                    <div class="vector-diagram"><div class="vector-arrow"></div></div>
                </div>

                <div style="color: var(--text-bright-muted); font-size: var(--fs-sm);" id="hint-text-display">
                    ヒント：床から見た静止座標系か、台と一緒に動く加速座標系か、視点を統一しましょう。
                </div>
            </section>

            <aside class="squircle-tile ai-sidebar-tile glass-sidebar">
                <div class="tile-header-group">
                    <span class="badge badge-ai" id="ai-status">AI TUTOR // ACTIVE</span>
                    <h3 style="font-size: var(--fs-md); font-weight: 800;" id="current-step">ステップ1: 状況の整理</h3>
                </div>

                <div class="chat-history">
                    <div class="chat-bubble bubble-ai" id="initial-ai-bubble">
                        どこで迷っていますか？まずは問題文の条件を整理してみましょう。
                    </div>
                </div>

                <div class="chat-input-wrapper">
                    <input type="text" class="chat-input" placeholder="質問を入力...">
                    <button type="button" class="tactile-btn" style="padding: 0.5rem 1rem;">送信</button>
                </div>
            </aside>

            <section class="squircle-tile answer-formula-tile">
                <div class="tile-header-group">
                    <h3 style="font-size: var(--fs-md); font-weight: 900;">YOUR ANSWER // 数式入力</h3>
                </div>

                <div class="formula-input-container">
                    <input type="text" class="formula-input-field" placeholder="解答を入力してください" value="">
                    <button type="button" class="tactile-btn" id="submit-answer-btn" style="height: 54px; font-size: 1.1rem;">解答を確定する</button>
                </div>
            </section>
        </main>
    </div>

   <script>
        const GEMINI_API_KEY = "AQ.Ab8RN6K1zuWr0-mFNqAojEHCn-TJeAAvPq0epxQr0HbmQQrynw"; 
        const GEMINI_API_URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${GEMINI_API_KEY}`;
        
        const urlParams = new URLSearchParams(window.location.search);
        const PROBLEM_ID = urlParams.get('id') || "P-2026-X12";

        const SYSTEM_INSTRUCTION_BASE = `
        あなたは「ソクラテス式問答法」を用いる、物静かだが核心を突く高校生向けのAIチューターです。
        最終的な正解（数式や数値）は絶対に教えず、小さな問いかけで生徒を自力での解決へ導いてください。
        1回の発言につき、質問は「1つ」に絞ってください。
        
        【重要】変数や数式（例: m, M, g, sinθ, Nなど）をメッセージに含めるときは、必ず前後に $ をつけて「$m$」や「$\\sin\\theta$」のようにLaTeX形式の数式として出力してください。

        返談は必ず以下のJSONフォーマットの形式で出力してください。他の説明文などは一切含めないでください。
        {
          "ai_response": "生徒へ返すヒントメッセージ（数式には $ $ を使用すること）",
          "current_step_label": "現在のステップ名",
          "student_understanding_rate": 0から100の整数
        }
        `;

        let chatHistory = [];
        let currentProblemData = {};

        const defaultPhysicsData = {
            id: "P-2026-X12",
            title: "傾きの角 $\\theta$ のなめらかな斜面を持つ質量 $M$ の台が、水平な床の上に置かれている。この斜面上に質量 $m$ の小球を載せ、静かに手を放した。台が床から受ける垂直抗力 $N$ を表せ。",
            short_title: "非慣性系における慣性力と物体の運動方程式の構築",
            subject: "物理",
            field: "力学",
            errorCount: 5,
            lastAttemptAt: new Date().toISOString(),
            lastResult: false
        };

        function loadSessionData() {
            let allData = {};
            try {
                allData = JSON.parse(localStorage.getItem("remind_app_problems")) || {};
            } catch(e) { allData = {}; }

            if (PROBLEM_ID === "P-2026-X12") {
                if (!allData[PROBLEM_ID]) {
                    allData[PROBLEM_ID] = defaultPhysicsData;
                    localStorage.setItem("remind_app_problems", JSON.stringify(allData));
                }
                currentProblemData = allData[PROBLEM_ID];
            } else {
                currentProblemData = allData[PROBLEM_ID] || {
                    title: "指定された問題が見つかりません。", subject: "エラー", field: "不明", errorCount: 0
                };
            }

            document.getElementById("problem-id-display").textContent = `PROBLEM ID: ${currentProblemData.id || "CUSTOM"}`;
            document.getElementById("question-text-display").textContent = currentProblemData.title;
            
            const badge = document.getElementById("question-badge");
            badge.textContent = `${currentProblemData.subject} // ${currentProblemData.field} // 誤答回数: ${String(currentProblemData.errorCount).padStart(2, '0')}`;
            
            // ★超重要：もしカスタム問題に写真データ(imageData)があれば、ダミー図形の代わりに撮影写真をそのままはめ込む！
            const figBox = document.getElementById("figure-box");
            if (currentProblemData.imageData) {
                figBox.style.display = "flex";
                figBox.innerHTML = `<img src="${currentProblemData.imageData}" style="width:100%; height:100%; object-fit:contain; border-radius:12px;">`;
                document.getElementById("hint-text-display").textContent = currentProblemData.trap_description || "AIチューターと一緒に弱点を分析していこう。";
                document.getElementById("initial-ai-bubble").textContent = `新しく登録された「${currentProblemData.field}」の問題ですね。撮影された写真をもとに考えていきましょう！`;
            } else if (PROBLEM_ID !== "P-2026-X12") {
                // 画像がないカスタム問題の場合は非表示にする
                figBox.style.display = "none";
                document.getElementById("hint-text-display").textContent = currentProblemData.trap_description || "AIチューターと一緒に弱点を分析していこう。";
            }

            chatHistory = [
                {
                    "role": "user",
                    "parts": [{ "text": `【問題文】 ${currentProblemData.title}` }]
                },
                {
                    "role": "model",
                    "parts": [{ "text": `{"ai_response": "問題を確認しました。どこで迷っていますか？まずは図を描いて働く力 $m$ や $N$ を整理してみましょう。", "current_step_label": "ステップ1: 状況の整理", "student_understanding_rate": 20}` }]
                }
            ];

            setTimeout(() => {
                if (window.MathJax) MathJax.typesetPromise();
            }, 100);
        }

        function submitAnswer(studentAnswer) {
            let allData = {};
            try { allData = JSON.parse(localStorage.getItem("remind_app_problems")) || {}; } catch(e) { allData = {}; }

            let currentProblem = allData[PROBLEM_ID] || currentProblemData;
            const cleanedAnswer = studentAnswer.replace(/\s+/g, "");

            let isCorrect = false;
            if (PROBLEM_ID === "P-2026-X12") {
                if (cleanedAnswer.includes("(M+m)g") && (cleanedAnswer.includes("sin") || cleanedAnswer.includes("θ"))) {
                    isCorrect = true;
                }
            }

            if (isCorrect) {
                alert("🎉 正解です！素晴らしい！誤答を克服しました。");
                currentProblem.lastResult = true;
                currentProblem.errorCount = 0; 
            } else {
                alert("❌ 記録しました。右側のAIチューターにヒントをもらいながらもう一度考えてみよう！");
                currentProblem.lastResult = false;
                currentProblem.errorCount = Number(currentProblem.errorCount || 1) + 1;
            }

            currentProblem.lastAttemptAt = new Date().toISOString();
            allData[PROBLEM_ID] = currentProblem;
            try { localStorage.setItem("remind_app_problems", JSON.stringify(allData)); } catch(e) {}
            loadSessionData();
        }

        async function sendMessageToGemini(studentMessage) {
            const statusBadge = document.getElementById("ai-status");
            statusBadge.textContent = "AI TUTOR // THINKING...";
            statusBadge.style.color = "var(--accent-magenta)";

            chatHistory.push({ "role": "user", "parts": [{ "text": studentMessage }] });

            const requestBody = {
                "contents": chatHistory,
                "systemInstruction": { "parts": [{ "text": SYSTEM_INSTRUCTION_BASE }] },
                "generationConfig": { "responseMimeType": "application/json", "temperature": 0.7 }
            };

            try {
                const response = await fetch(GEMINI_API_URL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(requestBody)
                });

                if (!response.ok) throw new Error(`API error: ${response.status}`);

                const data = await response.json();
                const rawJsonText = data.candidates[0].content.parts[0].text;

                chatHistory.push({ "role": "model", "parts": [{ "text": rawJsonText }] });

                const parsedResult = JSON.parse(rawJsonText);
                updateChatUI(studentMessage, parsedResult);

            } catch (error) {
                console.error("Error:", error);
                alert("Geminiとの通信に失敗しました。");
            } finally {
                statusBadge.textContent = "AI TUTOR // ACTIVE";
                statusBadge.style.color = "var(--accent-cyan)";
            }
        }

        function updateChatUI(userText, aiJson) {
            const chatHistoryArea = document.querySelector(".chat-history");
            const stepLabel = document.getElementById("current-step");

            const userBubble = document.createElement("div");
            userBubble.className = "chat-bubble bubble-user";
            userBubble.textContent = userText;
            chatHistoryArea.appendChild(userBubble);

            const aiBubble = document.createElement("div");
            aiBubble.className = "chat-bubble bubble-ai";
            aiBubble.textContent = aiJson.ai_response;
            chatHistoryArea.appendChild(aiBubble);

            if (aiJson.current_step_label) {
                stepLabel.textContent = aiJson.current_step_label;
            }
            chatHistoryArea.scrollTop = chatHistoryArea.scrollHeight;

            if (window.MathJax) { MathJax.typesetPromise(); }
        }

        document.addEventListener("DOMContentLoaded", () => {
            loadSessionData();

            const sendBtn = document.querySelector(".chat-input-wrapper button");
            const inputField = document.querySelector(".chat-input");
            const formulaInput = document.querySelector(".formula-input-field");
            const submitBtn = document.getElementById("submit-answer-btn");

            const handleSend = () => {
                const text = inputField.value.trim();
                if (!text) return;
                inputField.value = "";
                sendMessageToGemini(text);
            };

            sendBtn.addEventListener("click", handleSend);
            inputField.addEventListener("keypress", (e) => {
                if (e.key === "Enter") handleSend();
            });

            submitBtn.addEventListener("click", () => {
                submitAnswer(formulaInput.value.trim());
            });
        });
    </script>
</body>
</html>
