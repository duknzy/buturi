<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RETROGRADE // DAILY SPRINT 10</title>
    <link rel="stylesheet" href="style.css">
    
 <script>
        window.MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            options: {
                ignoreHtmlClass: 'tex2jax_ignore',
                processHtmlClass: 'tex2jax_process'
            },
            chtml: {
                displayAlign: 'left'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>

    <style>
        .sprint-container { max-width: 1000px; margin: 0 auto; display: flex; flex-direction: column; gap: 1.5rem; min-height: calc(100vh - 3rem); }
        header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #1a2a35; padding-bottom: 1rem; }
        .timer-display { font-size: 2rem; font-weight: 900; color: var(--accent-magenta); font-family: monospace; letter-spacing: 1px; text-shadow: 0 0 10px rgba(255, 0, 127, 0.3); }
        .progress-badge { background: transparent; color: var(--accent-cyan); border: 1px solid var(--accent-cyan); }
        
        .problem-card { 
            display: flex; 
            flex-direction: column; 
            gap: 1.5rem; 
            padding: 2rem; 
            background: var(--card-bg-glass); 
            border: 1px solid rgba(0, 243, 255, 0.2); 
            box-shadow: 4px 4px 0px rgba(0, 243, 255, 0.05);
            height: auto !important;
            position: relative;
        }
        
        .sprint-title { font-size: 1.4rem; font-weight: 800; line-height: 1.6; color: var(--text-main); min-height: auto; margin-bottom: 1rem; }
        .control-panel { display: flex; gap: 1rem; width: 100%; margin-top: 1rem; position: relative; z-index: 10; }
        .btn-action { flex: 1; height: 54px; font-size: 1.1rem; font-weight: 800; cursor: pointer; }
        .btn-wrong { background: var(--accent-magenta) !important; color: #000 !important; box-shadow: 4px 4px 0px #9e004f !important; }
        .btn-correct { background: var(--accent-cyan) !important; color: #000 !important; box-shadow: 4px 4px 0px #008b94 !important; }
        
        .reveal-zone { display: none; flex-direction: column; gap: 1.2rem; background: rgba(255,255,255,0.02); padding: 1.5rem; border-radius: 16px; border: 1px dashed #3a3a4a; margin-top: 1.5rem; width: 100%; }
        .result-screen { display: none; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 4rem 2rem; border: 1px solid var(--accent-cyan); background: var(--card-bg-glass); }
        
        .mjx-chtml { margin: 0.5rem 0 !important; padding-left: 2px; }
    </style>
</head>
<body>

    <div class="sprint-container">
        <header>
            <div style="display: flex; align-items: center; gap: 1rem;">
                <span style="font-weight: 900; letter-spacing: -1px; color: var(--accent-cyan)">DAILY SPRINT 10</span>
                <span class="badge progress-badge" id="sprint-progress">ANALYZING...</span>
            </div>
            <div class="timer-display" id="sprint-timer">00:00.00</div>
        </header>

        <main id="sprint-play-zone" class="squircle-tile problem-card">
            <div style="display: flex; gap: 0.5rem;">
                <span class="badge badge-physics" id="problem-meta">AI // SYNAPSES</span>
            </div>
            
            <div class="sprint-title" id="problem-title-display">🤖 クラウド同期完了。AIがあなたの誤答データをスキャンし、本日の特訓問題10問を生成しています。少々お待ちください（約5秒）...</div>

            <div class="control-panel" id="action-trigger-zone">
                <button type="button" class="tactile-btn btn-action" id="btn-reveal-ans" style="background:#111; color:#fff; border:1px solid #333; display:none;">👁 答えを確認する</button>
            </div>

            <div class="reveal-zone" id="sprint-reveal-zone">
                <hr style="border: 0; border-top: 1px dashed #22222a; margin-bottom: 0.5rem;">
                <div style="font-size:0.8rem; color:var(--text-muted); font-weight:800; margin-bottom:0.2rem;">CORRECT ANSWER</div>
                <div class="model-answer-text" id="sprint-answer-display" style="font-size:1.3rem; color:var(--accent-cyan); font-weight:900; margin-bottom:1rem;">---</div>
                
                <div style="font-size:0.8rem; color:var(--text-muted); font-weight:800; margin-bottom:0.2rem;">STEPS</div>
                <div class="model-answer-text" id="sprint-steps-display" style="font-size:1rem; white-space:pre-wrap; line-height:1.6; color:var(--text-bright-muted); margin-bottom:1rem;">---</div>
                
                <div class="control-panel">
                    <button type="button" class="tactile-btn btn-action btn-wrong" id="btn-sprint-wrong">❌ ミスった（RE:MINDへ送る）</button>
                    <button type="button" class="tactile-btn btn-action btn-correct" id="btn-sprint-correct">🎉 解けた！(次へ)</button>
                </div>
            </div>
        </main>

        <div id="sprint-result-zone" class="squircle-tile result-screen">
            <h2 style="font-size: 2rem; font-weight: 900; color: var(--accent-cyan); margin-bottom: 1rem;">🏁 FINISH // チェッカーフラッグ！</h2>
            <p style="color:var(--text-muted); margin-bottom: 2rem;">本日の計算スプリント10問をすべてクリアしました。</p>
            <div style="font-size: 1rem; color:var(--text-bright-muted); margin-bottom: 0.5rem; font-weight: 800;">TOTAL TIME</div>
            <div class="timer-display" id="final-time-display" style="font-size: 3.5rem; margin-bottom: 3rem;">00:00.00</div>
            <button type="button" class="tactile-btn" onclick="location.href='index.html'" style="padding: 1rem 2rem; background: var(--accent-cyan); box-shadow: 4px 4px 0px #008b94;">ダッシュボードに戻る</button>
        </div>
    </div>

    <script type="module">
        const proto = "https" + "://";
        const d = ".";
        const fbBase = proto + "www" + d + "gstatic" + d + "com/firebasejs/10.12.0/";

        const { initializeApp } = await import(fbBase + "firebase-app.js");
        const { getAuth, onAuthStateChanged } = await import(fbBase + "firebase-auth.js");
        const { getDatabase, ref, set, onValue } = await import(fbBase + "firebase-database.js");

        // Firebase設定
        const firebaseConfig = {
            apiKey: "AIzaSyB55MdhpjJizQaLEdRu-XhBVJ4PqrHsAyY", 
            authDomain: "buturi-2449e.firebaseapp.com",
            databaseURL: proto + "buturi-2449e-default-rtdb" + d + "asia-southeast1" + d + "firebasedatabase" + d + "app/",
            projectId: "buturi-2449e",
            storageBucket: "buturi-2449e.appspot.com",
            messagingSenderId: "976306696124",
            appId: "1:976306696124:web:e455c1953544bff5c345b9"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const database = getDatabase(app);

        // 🔑【変更】DeepSeek APIの設定（index.htmlの登録キーと連動させます）
        let DEEPSEEK_API_KEY = localStorage.getItem("RE_MIND_DEEPSEEK_KEY") || localStorage.getItem("RE_MIND_GEMINI_KEY");
        const DEEPSEEK_API_URL = "https://api.deepseek.com/chat/completions";

        let selectedQuestions = [];
        let currentQuestionIndex = 0;
        let loginUid = null;
        let startTime = 0;
        let timerInterval = null;


        // ==========================================================================
        // 🛠【関数定義群】(ReferenceErrorを防ぐため、先にすべて評価させます)
        // ==========================================================================

        // ✨ クラウドキャッシュ確認＆AI生成パイプライン
        function setupDailySprintAI(uid) {
            const now = new Date();
            const todayStr = `${now.getFullYear()}-${now.getMonth() + 1}-${now.getDate()}`;
            
            // クラウド上に「今日の問題」が既にキャッシュされているかチェック
            const sprintCacheRef = ref(database, 'users/' + uid + '/daily_sprint/' + todayStr);
            
            onValue(sprintCacheRef, async (snapshot) => {
                const cacheData = snapshot.val();
                if (cacheData && cacheData.questions) {
                    // 既に今日1回作っていたら、それを流用（リロード対策）
                    selectedQuestions = cacheData.questions;
                    startSprintTimer();
                } else {
                    // 今日まだ作ってないなら、あなたの弱点データを集計してAIに生成させる
                    await generateSprintWithAI(uid, todayStr, sprintCacheRef);
                }
            }, { onlyOnce: true });
        }

        // ✨ 誤答自動スキャン＆DeepSeek（最新V4・Thinkingモード）問題作成処理
        async function generateSprintWithAI(uid, todayStr, sprintCacheRef) {
            const problemsRef = ref(database, 'users/' + uid + '/problems');
            
            onValue(problemsRef, async (snapshot) => {
                const allProblems = snapshot.val() || {};
                let weakFields = [];
                
                Object.keys(allProblems).forEach(id => {
                    const p = allProblems[id];
                    if (p.subject && p.subject.includes("数学") && (p.errorCount > 0 || p.lastResult === false)) {
                        if (p.field) weakFields.push(p.field);
                    }
                });
                
                weakFields = [...new Set(weakFields)].slice(0, 5);
                const weakFieldsText = weakFields.length > 0 ? weakFields.join(", ") : "特になし（全体からバランスよく出題してください）";

                // DeepSeekの推論力を引き出すプロンプト
                const systemPrompt = `
あなたは日本の高校数学（特に数学II）の教育に精通した、極めて優秀なAI数学教師です。
生徒の数学目的思考力と計算力を限界まで引き上げるため、本日の【数学II】の計算特訓タイムアタック問題を【厳密に10問】作成してください。

【⚠️ 出力形式の絶対ルール（超厳重）】
- 出力は、一切の説明、前置き、挨拶、およびMarkdownのコードブロック（\`\`\`json や \`\`\`）を含まない、**純粋なJSON配列の文字列のみ**としてください。
- レスポンスの最初の文字は \`[\` であり、最後の文字は \`]\` でなければなりません。そのまま JSON.parse() でパースできる形式にしてください。

【出題テーマ・難易度】
1. 対象範囲：【数学II】の全範囲（式と証明、複素数と方程式、図形と方程式、三角関数、指数・対数関数、微分・積分）から、特定の分野に偏らないようバランスよく10問を構成。
2. 難易度設定：教科書の章末問題〜共通テスト、中堅〜上位国公立・私大の小問レベル（「ちょいむず」）。
3. 質的アプローチ：単なる数字が大きくて面倒なだけの計算ではなく、公式の鮮やかな組み合わせ、対称性の利用、適切な文字の置き換え（置換）、因数分解の一工夫など、数学的な「視点や気付き」を必要とする少しひねりのある良質な計算・標準問題にしてください。紙とペンを使い、1問あたり3〜5分程度で完結するもの。

【数式・解説ルール】
1. 数式フォーマット：問題文(title)、答え(answer)、解説(steps)に含まれる数式や変数は、必ず前後に $ または $$ をつけて美しいLaTeX数式形式にしてください。
2. 解説の構造化：steps（解説）は1行に詰め込まず、計算過程や使用した公式、思考のステップごとに必ず改行コード（\\\\n）を挟んで、論理の飛躍がない見やすい箇条書き形式にしてください。

【JSONフォーマット】
[
  {
    "id": "AI_SPRINT_${Date.now()}_1",
    "subject": "数学II",
    "field": "分野名（例: 三角関数）",
    "title": "問題文（数式は$ $で挟む）",
    "answer": "最終的な正しい答え（数式は$ $で挟む）",
    "steps": "ステップごとの解説（\\\\nで改行を挟む）"
  }
]
`;

                try {
                    // 🛡️【キーの防衛チェック】キーが空、または"null"という文字列になっていないか検証
                    if (!DEEPSEEK_API_KEY || DEEPSEEK_API_KEY === "null" || DEEPSEEK_API_KEY.trim() === "") {
                        throw new Error("DeepSeekのAPIキーがブラウザに設定されていません。ダッシュボード画面の下部にある『APIキー消去』ボタンを一度押し、再読み込みして正しいキーを登録し直してください。");
                    }

                    // 🚀【仕様変更】最新のDeepSeek V4「Thinking Mode（思考モード）」の公式リクエスト構造に刷新
                    const response = await fetch(DEEPSEEK_API_URL, {
                        method: "POST",
                        headers: { 
                            "Content-Type": "application/json",
                            "Authorization": `Bearer ${DEEPSEEK_API_KEY.trim()}`
                        },
                        body: JSON.stringify({
                            "model": "deepseek-v4-flash", // ✨最新のV4モデルを指定
                            "messages": [
                                { "role": "system", "content": "あなたは優秀なAI数学教師です。指定されたJSONフォーマットの配列のみを厳密に返してください。" },
                                { "role": "user", "content": systemPrompt }
                            ],
                            "extra_body": {
                                "thinking": { "type": "enabled" } // ✨公式の思考プロセス（推論）有効化フラグ
                            }
                        })
                    });

                    // 🔍【デバッグ強化】400等のエラー時、DeepSeekが返した「本当の理由」を生で剥ぎ取る処理
                    if (!response.ok) {
                        let detailedError = `HTTPステータス: ${response.status}`;
                        try {
                            const errJson = await response.json();
                            if (errJson && errJson.error && errJson.error.message) {
                                detailedError = errJson.error.message; // サーバーからの具体的なエラーメッセージ
                            } else {
                                detailedError = JSON.stringify(errJson);
                            }
                        } catch (e) {
                            try { detailedError = await response.text(); } catch(tErr) {}
                        }
                        throw new Error(detailedError);
                    }

                    const data = await response.json();
                    let rawJsonText = data.choices[0].message.content.trim();

                    if (rawJsonText.startsWith("```json")) rawJsonText = rawJsonText.substring(7);
                    else if (rawJsonText.startsWith("```")) rawJsonText = rawJsonText.substring(3);
                    if (rawJsonText.endsWith("```")) rawJsonText = rawJsonText.substring(0, rawJsonText.length - 3);
                    rawJsonText = rawJsonText.trim();

                    const fixJsonEscapes = (str) => {
                        let inString = false; let result = "";
                        for (let i = 0; i < str.length; i++) {
                            let c = str[i];
                            if (c === '"' && (i === 0 || str[i-1] !== '\\')) { inString = !inString; result += c; }
                            else if (c === '\\' && inString) {
                                let next = str[i+1];
                                if (next === '"') { result += '\\"'; i++; }
                                else if (next === '\\') { result += '\\\\'; i++; }
                                else if (next === 'n' && (str[i+2] === ' ' || str[i+2] === '"' || str[i+2] === '\\' || !/[a-zA-Z]/.test(str[i+2]))) { result += '\\n'; i++; }
                                else { result += '\\\\'; }
                            } else { result += c; }
                        }
                        return result;
                    };

                    const aiQuestions = JSON.parse(fixJsonEscapes(rawJsonText));
                    
                    if (!Array.isArray(aiQuestions) || aiQuestions.length === 0) {
                        throw new Error("AIの応答配列が異常です。");
                    }

                    await set(sprintCacheRef, { questions: aiQuestions, generatedAt: new Date().toISOString() });
                    selectedQuestions = aiQuestions;
                    startSprintTimer();

                } catch (error) {
                    console.error("AI問題生成エラー:", error);
                    // エラーメッセージのなかに具体的な理由（キーの間違い、残高不足など）が表示されます
                    alert("⚠️ DeepSeekによる問題生成に失敗しました。\n\n【エラー内容】\n" + error.message + "\n\n※バックアップの固定問題ノックを開始します。");
                    
                    selectedQuestions = [
                        { id: "BK_01", subject: "数学II", field: "三角関数", title: "$\sin \theta + \cos \theta = \frac{1}{2}$ のとき、$\sin^3 \theta + \cos^3 \theta$ の値を求めよ。", answer: "$\frac{11}{16}$", steps: "1. 両辺を2乗して $\sin \theta \cos \theta$ を求める。\\n$1 + 2\sin \theta \cos \theta = \frac{1}{4} \implies \sin \theta \cos \theta = -\frac{3}{8}$。\\n2. 因数分解公式 $a^3+b^3=(a+b)(a^2-ab+b^2)$ に代入。\\n$\frac{1}{2} \times (1 - (-\frac{3}{8})) = \frac{1}{2} \times \frac{11}{8} = \frac{11}{16}$。" },
                        { id: "BK_02", subject: "数学II", field: "指数・対数関数", title: "方程式 $\log_2 x + \log_2 (x-2) = 3$ を解け。", answer: "$x = 4$", steps: "1. 真数条件より $x > 0$ かつ $x-2 > 0$、よって $x > 2$。\\n2. 对数の性質より $\log_2 \{x(x-2)\} = 3 \implies x(x-2) = 2^3 = 8$。\\n3. 整理して $x^2 - 2x - 8 = 0 \implies (x-4)(x+2) = 0$。\\n4. 真数条件 $x > 2$ より、 $x = 4$。" }
                    ];
                    startSprintTimer();
                }
            }, { onlyOnce: true });
        }

        function startSprintTimer() {
            document.getElementById("btn-reveal-ans").style.display = "block";
            startTime = Date.now();
            timerInterval = setInterval(updateTimer, 10);
            renderQuestion();
        }

        function updateTimer() {
            const diff = Date.now() - startTime;
            const min = String(Math.floor(diff / 60000)).padStart(2, '0');
            const sec = String(Math.floor((diff % 60000) / 1000)).padStart(2, '0');
            const ms = String(Math.floor((diff % 1000) / 10)).padStart(2, '0');
            document.getElementById("sprint-timer").textContent = `${min}:${sec}.${ms}`;
        }

        async function forceTriggerMathJax() {
            if (window.MathJax && MathJax.typesetPromise) {
                try { await MathJax.typesetPromise(); } catch (err) { console.log(err.message); }
            }
        }

        function renderQuestion() {
            if (currentQuestionIndex >= selectedQuestions.length) {
                finishSprint();
                return;
            }

            document.getElementById("sprint-reveal-zone").style.display = "none";
            document.getElementById("btn-reveal-ans").style.display = "block";
            document.getElementById("sprint-progress").textContent = `Q. ${currentQuestionIndex + 1} / ${selectedQuestions.length}`;

            const q = selectedQuestions[currentQuestionIndex];
            document.getElementById("problem-meta").textContent = `${q.subject} // ${q.field} // AI生成`;
            
            document.getElementById("problem-title-display").innerHTML = q.title;
            document.getElementById("sprint-answer-display").innerHTML = q.answer;
            
            let cleanSteps = q.steps || "";
            cleanSteps = cleanSteps.replace(/\\n/g, '<br>').replace(/\n/g, '<br>');
            document.getElementById("sprint-steps-display").innerHTML = cleanSteps;

            forceTriggerMathJax();
        }

        async function sendToMainRemindList() {
            if (!loginUid) return;
            const q = selectedQuestions[currentQuestionIndex];
            
            const targetRef = ref(database, 'users/' + loginUid + '/problems/' + q.id);
            
            const remindProblem = {
                id: q.id,
                title: q.title,
                short_title: `【DS】${q.field}計算`,
                subject: q.subject,
                field: q.field,
                trap_description: "デイリースプリントノックでミスした問題。数式の展開や符号ミス、計算ルートの選定を見直してください。",
                errorCount: 1,
                lastAttemptAt: new Date().toISOString(),
                lastResult: false,
                imageData: null,
                answerFormula: `${q.answer}\n\n【解説】\n${q.steps}`
            };

            try {
                await set(targetRef, remindProblem);
                alert("🚨 弱点としてロックオン！ダッシュボード（RE:MIND）の復習リストに自動転送・同期しました！");
                nextQuestion();
            } catch (e) {
                console.error(e);
                alert("クラウドへの転送に失敗しました。");
            }
        }

        function nextQuestion() {
            currentQuestionIndex++;
            renderQuestion();
        }

        function finishSprint() {
            clearInterval(timerInterval);
            const finalTime = document.getElementById("sprint-timer").textContent;
            document.getElementById("sprint-play-zone").style.display = "none";
            document.getElementById("sprint-result-zone").style.display = "flex";
            document.getElementById("final-time-display").textContent = finalTime;
        }


        // ==========================================================================
        // 📋【共通イベントリスナー登録群】
        // ==========================================================================
        document.getElementById("btn-reveal-ans").addEventListener("click", () => {
            document.getElementById("btn-reveal-ans").style.display = "none";
            document.getElementById("sprint-reveal-zone").style.display = "flex";
            forceTriggerMathJax();
        });

        document.getElementById("btn-sprint-correct").addEventListener("click", nextQuestion);
        document.getElementById("btn-sprint-wrong").addEventListener("click", sendToMainRemindList);


        // ==========================================================================
        // 🚀【重要】最下部へ引越し：すべての関数が出揃った後に認証状態を監視開始
        // ==========================================================================
        onAuthStateChanged(auth, (user) => {
            if (user) {
                loginUid = user.uid;
                setupDailySprintAI(user.uid);
            } else {
                location.href = "index.html";
            }
        });
    </script>
</body>
</html>
